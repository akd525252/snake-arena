<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#2a1f14"/>
    </linearGradient>
    <linearGradient id="snake" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="arenaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1f10" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)" stroke="#a86a3a" stroke-width="2"/>
  <circle cx="32" cy="34" r="24" fill="url(#arenaGlow)"/>
  <circle cx="32" cy="34" r="22" fill="none" stroke="#5c4033" stroke-width="1" opacity="0.35"/>
  <!-- Snake body - thicker, more visible curve -->
  <path d="M12 42 C16 50, 22 48, 26 42 C30 36, 34 34, 38 36 C42 38, 46 34, 46 30"
        fill="none" stroke="#064e3b" stroke-width="7" stroke-linecap="round"/>
  <path d="M12 42 C16 50, 22 48, 26 42 C30 36, 34 34, 38 36 C42 38, 46 34, 46 30"
        fill="none" stroke="url(#snake)" stroke-width="6" stroke-linecap="round"/>
  <!-- Scale highlights on body -->
  <circle cx="16" cy="44" r="3" fill="#34d399" opacity="0.3"/>
  <circle cx="26" cy="42" r="3" fill="#34d399" opacity="0.3"/>
  <circle cx="38" cy="36" r="3" fill="#34d399" opacity="0.3"/>
  <!-- Snake head -->
  <ellipse cx="48" cy="28" rx="6.5" ry="5.5" fill="url(#snake)" filter="url(#glow)"/>
  <ellipse cx="46" cy="26" rx="3" ry="2" fill="#34d399" opacity="0.3"/>
  <!-- Eyes -->
  <circle cx="46.5" cy="26.5" r="2" fill="#ffffff"/>
  <circle cx="50.5" cy="26" r="2" fill="#ffffff"/>
  <circle cx="47" cy="26.5" r="1" fill="#1a1410"/>
  <circle cx="51" cy="26" r="1" fill="#1a1410"/>
  <circle cx="47.3" cy="26" r="0.4" fill="#ffffff"/>
  <circle cx="51.3" cy="25.5" r="0.4" fill="#ffffff"/>
  <!-- Tongue -->
  <path d="M53 29 L57 31 M57 31 L58 29 M57 31 L58 33" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Coin with glow -->
  <circle cx="20" cy="24" r="6" fill="#fbbf2444" filter="url(#glow)"/>
  <circle cx="20" cy="24" r="5" fill="url(#coin)" stroke="#fde68a" stroke-width="0.8"/>
  <text x="20" y="27" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" font-weight="bold" fill="#78350f">$</text>
</svg>

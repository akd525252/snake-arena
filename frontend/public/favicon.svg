<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#3a2c1f"/>
    </linearGradient>
    <linearGradient id="snake" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)" stroke="#a86a3a" stroke-width="2"/>
  <!-- Arena circle -->
  <circle cx="32" cy="34" r="22" fill="none" stroke="#5c4033" stroke-width="1.5" opacity="0.5"/>
  <!-- Snake body -->
  <path d="M18 38 Q22 46, 28 42 T36 38 T42 32" fill="none" stroke="url(#snake)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Snake head -->
  <circle cx="42" cy="32" r="5" fill="url(#snake)"/>
  <!-- Eyes -->
  <circle cx="40.5" cy="30.5" r="1.2" fill="#ffffff"/>
  <circle cx="43.5" cy="30.5" r="1.2" fill="#ffffff"/>
  <circle cx="40.7" cy="30.7" r="0.5" fill="#1a1410"/>
  <circle cx="43.7" cy="30.7" r="0.5" fill="#1a1410"/>
  <!-- Tongue -->
  <line x1="46" y1="33" x2="49" y2="34" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="49" y1="34" x2="49" y2="32" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="49" y1="34" x2="49" y2="36" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Coin -->
  <circle cx="22" cy="28" r="4" fill="url(#coin)"/>
  <text x="22" y="30" text-anchor="middle" font-size="5" font-family="sans-serif" font-weight="bold" fill="#3a2c1f">$</text>
</svg>

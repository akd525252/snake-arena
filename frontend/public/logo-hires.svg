<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#3a2c1f"/>
    </linearGradient>
    <linearGradient id="snake" x1="0.2" y1="0.2" x2="0.8" y2="0.8">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="snakeGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="coinRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <radialGradient id="arenaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1f10"/>
      <stop offset="70%" stop-color="#1a3d2c"/>
      <stop offset="100%" stop-color="#0f291e"/>
    </radialGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="snakeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#064e3b" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background badge -->
  <rect width="512" height="512" rx="96" fill="url(#bg)" stroke="#a86a3a" stroke-width="6" filter="url(#dropShadow)"/>

  <!-- Arena circle -->
  <circle cx="256" cy="270" r="176" fill="url(#arenaGlow)" opacity="0.6"/>
  <circle cx="256" cy="270" r="168" fill="none" stroke="#5c4033" stroke-width="2" opacity="0.3"/>

  <!-- Small decorative coins scattered in background -->
  <circle cx="152" cy="206" r="16" fill="url(#coinRim)" opacity="0.6"/>
  <circle cx="152" cy="206" r="11" fill="url(#coin)"/>
  <text x="152" y="212" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" font-weight="bold" fill="#92400e">$</text>

  <circle cx="376" cy="160" r="14" fill="url(#coinRim)" opacity="0.5"/>
  <circle cx="376" cy="160" r="9.5" fill="url(#coin)"/>
  <text x="376" y="165" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" font-weight="bold" fill="#92400e">$</text>

  <circle cx="370" cy="340" r="12" fill="url(#coinRim)" opacity="0.4"/>
  <circle cx="370" cy="340" r="8" fill="url(#coin)"/>

  <!-- Snake body — dynamic curve through arena -->
  <path d="M 72 280
           C 72 340, 120 400, 180 380
           C 240 360, 280 300, 300 260
           C 320 220, 360 200, 400 220
           C 440 240, 460 290, 430 320"
        fill="none" stroke="#064e3b" stroke-width="34" stroke-linecap="round" filter="url(#snakeShadow)"/>

  <path d="M 72 280
           C 72 340, 120 400, 180 380
           C 240 360, 280 300, 300 260
           C 320 220, 360 200, 400 220
           C 440 240, 460 290, 430 320"
        fill="none" stroke="url(#snake)" stroke-width="30" stroke-linecap="round"/>

  <!-- Snake segment bumps for body depth -->
  <circle cx="90" cy="298" r="15" fill="url(#snakeGlow)"/>
  <circle cx="140" cy="360" r="15" fill="url(#snakeGlow)"/>
  <circle cx="200" cy="365" r="15" fill="url(#snakeGlow)"/>
  <circle cx="280" cy="288" r="15" fill="url(#snakeGlow)"/>
  <circle cx="340" cy="226" r="15" fill="url(#snakeGlow)"/>
  <circle cx="420" cy="264" r="15" fill="url(#snakeGlow)"/>

  <!-- Snake head -->
  <g transform="translate(430, 320) rotate(25)">
    <!-- Head base -->
    <ellipse cx="0" cy="0" rx="44" ry="36" fill="url(#snake)"/>
    <!-- Head highlight -->
    <ellipse cx="-8" cy="-10" rx="22" ry="14" fill="#34d399" opacity="0.35"/>
    <!-- Eyes -->
    <circle cx="18" cy="-10" r="11" fill="#ffffff"/>
    <circle cx="34" cy="-6" r="11" fill="#ffffff"/>
    <circle cx="21" cy="-8" r="6" fill="#1a1410"/>
    <circle cx="36" cy="-4" r="6" fill="#1a1410"/>
    <circle cx="23" cy="-10" r="2.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="38" cy="-6" r="2.5" fill="#ffffff" opacity="0.9"/>
    <!-- Tongue -->
    <path d="M 38 14 L 56 22 M 56 22 L 60 14 M 56 22 L 60 30"
          stroke="#ef4444" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Main coin in snake's path -->
  <g>
    <circle cx="255" cy="180" r="32" fill="url(#coinRim)" filter="url(#dropShadow)"/>
    <circle cx="255" cy="180" r="26" fill="url(#coin)"/>
    <circle cx="255" cy="180" r="22" fill="none" stroke="#fde68a" stroke-width="1.5" opacity="0.5"/>
    <text x="255" y="192" text-anchor="middle" font-size="32" font-family="Arial, sans-serif" font-weight="bold" fill="#78350f">$</text>
  </g>

  <!-- Bottom text label -->
  <text x="256" y="460" text-anchor="middle" font-size="28" font-family="'Cinzel', 'Georgia', serif" font-weight="700" fill="#d4a04a" letter-spacing="6">SNAKE ARENA</text>
  <text x="256" y="484" text-anchor="middle" font-size="13" font-family="'Cinzel', 'Georgia', serif" font-weight="400" fill="#a86a3a" letter-spacing="3" opacity="0.7">MULTIPLAYER · ARENA · USDT</text>
</svg>
